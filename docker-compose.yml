services:
  app:
    build: .
    ports:
      - "3001:3001"
    # WAŻNE: Zmienne poniżej (np. ${POSTGRES_USER}) MUSZĄ być ustawione
    # w panelu Twojego dostawcy hostingu w sekcji "Secrets" lub "Zmienne Środowiskowe".
    # Aplikacja nie działa, ponieważ te zmienne nie są obecnie ustawione.
    environment:
      - POSTGRES_USER=${postgresDBU}
      - POSTGRES_PASSWORD=${password#%@#%ff22}
      - POSTGRES_DB=${fantasy_game}
      - POSTGRES_HOST=db
      - PORT=${3001}
      - JWT_SECRET=${SDFGTDVBNHJESRTWDSFSA}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads

  db:
    image: postgres:15-alpine
    # WAŻNE: Te zmienne również muszą być ustawione w panelu Twojego dostawcy hostingu
    # w sekcji "Secrets" lub "Zmienne Środowiskowe", aby zainicjować bazę danych.
    environment:
      POSTGRES_USER: ${postgresDBU}
      POSTGRES_PASSWORD: ${password#%@#%ff22}
      POSTGRES_DB: ${fantasy_game}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ta komenda sprawdza, czy baza danych jest gotowa na przyjmowanie połączeń.
      # Używa ona zmiennych środowiskowych, które musisz podać w panelu Hostinger.
      test: ["CMD-SHELL", "pg_isready -U $$postgresDBU -d $$fantasy_game"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
